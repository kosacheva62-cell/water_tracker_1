name: water_tracker_1
description: "💧 Трекер воды — следите за водным балансом легко и удобно"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  vibration: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# 🔑 НАСТРОЙКА ГЕНЕРАЦИИ ИКОНОК
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#fbfcfb"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# 🌊 НАСТРОЙКА ЗАСТАВКИ (SPLASH SCREEN)
flutter_native_splash:
  color: "#fbfcfb"
  image: "assets/icons/app_icon.png"
  color_dark: "#0D152A"
  image_dark: "assets/icons/app_icon.png"
  android: true
  ios: true
  android_12:
    color: "#fbfcfb"
    image: "assets/icons/app_icon.png"
    color_dark: "#0D152A"
    image_dark: "assets/icons/app_icon.png"